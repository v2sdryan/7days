<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>7日心靈第二心跳挑戰卡</title>
  <style>
    :root {
      --bg-top: #fff4e6;
      --bg-bottom: #f4fbf5;
      --card: rgba(255, 255, 255, 0.88);
      --card-strong: #ffffff;
      --text: #1d2a2f;
      --muted: #5c6e74;
      --line: rgba(29, 42, 47, 0.1);
      --accent: #1f8f6b;
      --accent-deep: #0d5f47;
      --accent-soft: rgba(31, 143, 107, 0.12);
      --gold: #cf8b2d;
      --shadow: 0 20px 45px rgba(25, 58, 49, 0.12);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --safe-bottom: max(24px, env(safe-area-inset-bottom));
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Noto Sans HK", "PingFang HK", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 207, 139, 0.45), transparent 34%),
        radial-gradient(circle at right 12% top 20%, rgba(110, 188, 153, 0.22), transparent 30%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    }

    body {
      padding: 22px 16px var(--safe-bottom);
    }

    .shell {
      width: min(100%, 460px);
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .hero,
    .panel,
    .tracker {
      border: 1px solid rgba(255, 255, 255, 0.75);
      background: var(--card);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-xl);
      padding: 24px 20px;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -18px -34px auto;
      width: 116px;
      height: 116px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 214, 153, 0.75), rgba(255, 255, 255, 0));
      pointer-events: none;
    }

    .eyebrow {
      margin: 0 0 8px;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: var(--gold);
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 6vw, 2.3rem);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 0.99rem;
      line-height: 1.6;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stat {
      border-radius: var(--radius-lg);
      padding: 16px;
      background: var(--card-strong);
      border: 1px solid var(--line);
    }

    .stat-label {
      margin: 0;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .stat-value {
      margin: 8px 0 0;
      font-size: 1.45rem;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .tracker {
      border-radius: var(--radius-xl);
      padding: 18px;
    }

    .tracker-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 12px;
    }

    .tracker-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 800;
    }

    .tracker-copy {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .tracker-pill {
      flex-shrink: 0;
      border-radius: 999px;
      padding: 7px 11px;
      background: var(--accent-soft);
      color: var(--accent-deep);
      font-weight: 800;
      font-size: 0.8rem;
    }

    .week-grid {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 4px 4px;
      scroll-behavior: smooth;
      scroll-snap-type: x proximity;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .week-grid::-webkit-scrollbar {
      display: none;
    }

    .day-chip {
      flex: 0 0 88px;
      border-radius: 16px;
      min-height: 74px;
      padding: 10px 6px;
      text-align: center;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid var(--line);
      display: grid;
      align-content: center;
      gap: 3px;
      scroll-snap-align: center;
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
    }

    .day-chip.active {
      border-color: rgba(31, 143, 107, 0.32);
      background: linear-gradient(180deg, rgba(233, 252, 245, 0.95), rgba(255, 255, 255, 0.98));
      transform: translateY(-2px);
    }

    .day-chip.today {
      outline: 2px solid rgba(207, 139, 45, 0.32);
      outline-offset: 1px;
    }

    .day-chip.future {
      background: rgba(255, 255, 255, 0.5);
    }

    .day-label {
      font-size: 0.74rem;
      color: var(--muted);
      font-weight: 700;
    }

    .day-number {
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .day-count {
      font-size: 0.75rem;
      color: var(--accent-deep);
      font-weight: 700;
    }

    .panel {
      border-radius: var(--radius-xl);
      padding: 18px;
    }

    .panel-title {
      margin: 0 0 6px;
      font-size: 1.06rem;
      font-weight: 800;
    }

    .panel-copy {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.92rem;
    }

    .trigger-list {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .trigger {
      position: relative;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 15px 14px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(248, 251, 249, 0.96));
      border: 1px solid var(--line);
      cursor: pointer;
      transition: border-color 180ms ease, transform 180ms ease, box-shadow 180ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .trigger:active {
      transform: scale(0.99);
    }

    .trigger.checked {
      border-color: rgba(31, 143, 107, 0.38);
      box-shadow: 0 16px 24px rgba(31, 143, 107, 0.08);
    }

    .trigger input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .tick {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      border-radius: 8px;
      border: 2px solid rgba(31, 143, 107, 0.28);
      background: #fff;
      display: grid;
      place-items: center;
      margin-top: 2px;
      transition: background 180ms ease, border-color 180ms ease, transform 180ms ease;
    }

    .tick::after {
      content: "";
      width: 10px;
      height: 6px;
      border-left: 2px solid transparent;
      border-bottom: 2px solid transparent;
      transform: rotate(-45deg) translateY(-1px);
      transition: border-color 180ms ease;
    }

    .trigger.checked .tick {
      background: var(--accent);
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .trigger.checked .tick::after {
      border-color: #fff;
    }

    .trigger-body {
      min-width: 0;
    }

    .trigger-title {
      margin: 0;
      font-size: 0.98rem;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .trigger-copy {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .footer-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
    }

    .status {
      color: var(--muted);
      font-size: 0.84rem;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      background: linear-gradient(180deg, #1e8c69, #12664b);
      color: #fff;
      font: inherit;
      font-size: 0.92rem;
      font-weight: 800;
      box-shadow: 0 10px 18px rgba(18, 102, 75, 0.2);
    }

    .mini-note {
      margin: 0;
      color: var(--muted);
      font-size: 0.81rem;
      line-height: 1.55;
    }

    @media (min-width: 720px) {
      body {
        padding-top: 28px;
      }

      .shell {
        width: min(100%, 520px);
        gap: 18px;
      }

      .hero,
      .tracker,
      .panel {
        padding: 22px;
      }
    }

    @media (min-width: 560px) {
      .week-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        overflow: visible;
        padding: 2px 0 4px;
      }

      .day-chip {
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">7 Day Challenge</p>
      <h1>7日心靈第二心跳挑戰卡</h1>
      <p class="subtitle">每日用手機打剔，將心思慢慢對準耶穌。你可以按今日狀態，揀屬於自己嘅 Trigger 點。</p>
    </section>

    <section class="stats" aria-label="挑戰概覽">
      <article class="stat">
        <p class="stat-label">今日日期</p>
        <p class="stat-value" id="todayLabel">-</p>
      </article>
      <article class="stat">
        <p class="stat-label">今日已剔</p>
        <p class="stat-value"><span id="todayCount">0</span>/4</p>
      </article>
    </section>

    <section class="tracker" aria-labelledby="trackerTitle">
      <div class="tracker-head">
        <div>
          <h2 class="tracker-title" id="trackerTitle">7 日進度</h2>
          <p class="tracker-copy">今日固定放中間，左右都會顯示前後日期。</p>
        </div>
        <div class="tracker-pill" id="completionPill">0 / 7 日</div>
      </div>
      <div class="week-grid" id="weekGrid"></div>
    </section>

    <section class="panel" aria-labelledby="panelTitle">
      <h2 class="panel-title" id="panelTitle">請打剔，揀你今日嘅「專屬 Trigger 點」</h2>
      <p class="panel-copy">唔需要一次過做晒。今日最容易入手嘅，就由嗰一個開始。</p>

      <div class="trigger-list">
        <label class="trigger" for="trigger-morning">
          <input id="trigger-morning" type="checkbox" data-key="morning">
          <span class="tick" aria-hidden="true"></span>
          <div class="trigger-body">
            <p class="trigger-title">朝早起身</p>
            <p class="trigger-copy">瞓喺床先默唸 3 次，將第一念俾耶穌。</p>
          </div>
        </label>

        <label class="trigger" for="trigger-commute">
          <input id="trigger-commute" type="checkbox" data-key="commute">
          <span class="tick" aria-hidden="true"></span>
          <div class="trigger-body">
            <p class="trigger-title">搭車 / 碎片時間</p>
            <p class="trigger-copy">等巴士、搭港鐵嗰陣，唔好攞部手機出嚟，用簡版「耶穌，憐憫！」</p>
          </div>
        </label>

        <label class="trigger" for="trigger-stress">
          <input id="trigger-stress" type="checkbox" data-key="stress">
          <span class="tick" aria-hidden="true"></span>
          <div class="trigger-body">
            <p class="trigger-title">壓力爆煲時</p>
            <p class="trigger-copy">停一停，深呼吸，再用完整版禱句將心拉返嚟。</p>
          </div>
        </label>

        <label class="trigger" for="trigger-night">
          <input id="trigger-night" type="checkbox" data-key="night">
          <span class="tick" aria-hidden="true"></span>
          <div class="trigger-body">
            <p class="trigger-title">臨瞓前</p>
            <p class="trigger-copy">呼氣版 10 次，將最後一念俾耶穌。</p>
          </div>
        </label>
      </div>

      <div class="footer-row">
        <p class="status" id="saveStatus">未開始</p>
        <button type="button" id="clearToday">清除今日打剔</button>
      </div>
    </section>

    <p class="mini-note">勾選狀態會自動保存在你部手機瀏覽器內。去到第二日會顯示新一日清單，而最近 7 日記錄會保留。</p>
  </main>

  <script>
    const STORAGE_KEY = "second-heartbeat-challenge-v1";
    const triggerInputs = Array.from(document.querySelectorAll("input[type='checkbox'][data-key]"));
    const weekGrid = document.getElementById("weekGrid");
    const todayLabel = document.getElementById("todayLabel");
    const todayCount = document.getElementById("todayCount");
    const completionPill = document.getElementById("completionPill");
    const saveStatus = document.getElementById("saveStatus");
    const clearTodayButton = document.getElementById("clearToday");

    const locale = "zh-HK";

    function formatStorageDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return year + "-" + month + "-" + day;
    }

    function formatDisplayDate(date) {
      return new Intl.DateTimeFormat(locale, {
        month: "numeric",
        day: "numeric"
      }).format(date);
    }

    function formatDayLabel(date) {
      return new Intl.DateTimeFormat(locale, { weekday: "short" }).format(date);
    }

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { days: {} };
      } catch (error) {
        return { days: {} };
      }
    }

    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function pruneOldDays(state, today) {
      const cutoff = new Date(today);
      cutoff.setDate(cutoff.getDate() - 6);
      const cutoffKey = formatStorageDate(cutoff);
      Object.keys(state.days).forEach((dateKey) => {
        if (dateKey < cutoffKey) {
          delete state.days[dateKey];
        }
      });
    }

    function getTodayState(state, todayKey) {
      if (!state.days[todayKey]) {
        state.days[todayKey] = {};
      }
      return state.days[todayKey];
    }

    function countChecked(dayState) {
      return Object.values(dayState).filter(Boolean).length;
    }

    function applyTodayState(dayState) {
      triggerInputs.forEach((input) => {
        const checked = Boolean(dayState[input.dataset.key]);
        input.checked = checked;
        input.closest(".trigger").classList.toggle("checked", checked);
      });
      todayCount.textContent = String(countChecked(dayState));
    }

    function renderWeek(state, today) {
      weekGrid.innerHTML = "";
      let completedDays = 0;
      let todayChip = null;

      for (let offset = 3; offset >= -3; offset -= 1) {
        const day = new Date(today);
        day.setDate(today.getDate() - offset);
        const dayKey = formatStorageDate(day);
        const dayState = state.days[dayKey] || {};
        const doneCount = countChecked(dayState);
        const isFuture = offset < 0;

        if (doneCount > 0 && !isFuture) {
          completedDays += 1;
        }

        const chip = document.createElement("div");
        chip.className = "day-chip";
        if (isFuture) {
          chip.classList.add("future");
        }
        if (doneCount > 0) {
          chip.classList.add("active");
        }
        if (offset === 0) {
          chip.classList.add("today");
          todayChip = chip;
        }

        chip.innerHTML =
          '<div class="day-label">' + formatDayLabel(day) + "</div>" +
          '<div class="day-number">' + formatDisplayDate(day) + "</div>" +
          '<div class="day-count">' + (doneCount > 0 ? doneCount + " 項" : (isFuture ? "未到" : "未剔")) + "</div>";

        weekGrid.appendChild(chip);
      }

      completionPill.textContent = completedDays + " / 7 日";

      if (todayChip && window.matchMedia("(max-width: 559px)").matches) {
        requestAnimationFrame(() => {
          todayChip.scrollIntoView({
            block: "nearest",
            inline: "center"
          });
        });
      }
    }

    function setStatus(text) {
      saveStatus.textContent = text;
    }

    function refresh() {
      const now = new Date();
      const todayKey = formatStorageDate(now);
      const state = loadState();
      pruneOldDays(state, now);
      const todayState = getTodayState(state, todayKey);
      saveState(state);

      todayLabel.textContent = formatDisplayDate(now);
      applyTodayState(todayState);
      renderWeek(state, now);
      setStatus(countChecked(todayState) > 0 ? "已自動保存" : "今日未打剔");
    }

    triggerInputs.forEach((input) => {
      input.addEventListener("change", () => {
        const now = new Date();
        const todayKey = formatStorageDate(now);
        const state = loadState();
        pruneOldDays(state, now);
        const todayState = getTodayState(state, todayKey);

        todayState[input.dataset.key] = input.checked;
        saveState(state);

        input.closest(".trigger").classList.toggle("checked", input.checked);
        todayCount.textContent = String(countChecked(todayState));
        renderWeek(state, now);
        setStatus("剛剛已保存");
      });
    });

    clearTodayButton.addEventListener("click", () => {
      const now = new Date();
      const todayKey = formatStorageDate(now);
      const state = loadState();
      pruneOldDays(state, now);
      state.days[todayKey] = {};
      saveState(state);
      applyTodayState(state.days[todayKey]);
      renderWeek(state, now);
      setStatus("今日記錄已清除");
    });

    refresh();
  </script>
</body>
</html>
